name: CI Quality Gates & Verification

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    name: Lint, Typecheck, Test & Build
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgres://postgres:postgres@localhost:5432/test_db?sslmode=disable"
      NEXTAUTH_SECRET: "ci-test-secret-key-do-not-use-in-production"
      NEXTAUTH_URL: "http://localhost:3000"
      CONTENTFUL_SPACE_ID: "ci-dummy-space-id"
      CONTENTFUL_DELIEVERY_TOKEN: "ci-dummy-delivery-token"
      CONTENTFUL_PREVIEW_TOKEN: "ci-dummy-preview-token"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run ESLint
        run: pnpm lint

      - name: Run TypeScript type check
        run: npx tsc --noEmit

      - name: Run automated Vitest test suite
        run: pnpm test

      - name: Verify Next.js Production Build
        run: pnpm build
